name: Scrape item-post images and upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      page_url:
        description: "Page URL to scrape (.item-post img elements)"
        required: true
        type: string
      drive_folder_name:
        description: "Google Drive folder name to save images into"
        required: true
        type: string
      max_idle_scrolls:
        description: "Stop after this many scrolls with no new images"
        required: false
        default: "8"
        type: string
      max_images:
        description: "Optional: max number of images to scrape (leave blank to scrape until 8 idle scrolls)"
        required: false
        default: ""
        type: string
      parent_folder_id:
        description: "(optional) Drive parent folder ID to create the folder inside"
        required: false
        type: string
      spreadsheet_id:
        description: "(optional) Google Sheet ID to log file names into"
        required: false
        default: "1OQns3xUPeTQslsw0FaD-a85DAM0Sc_L6BnaGDMqGPmY"
        type: string
      sheet_tab:
        description: "Tab name inside the sheet to append rows to"
        required: false
        default: "Sheet1"
        type: string

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scraper + Drive uploader
        env:
          PAGE_URL: ${{ inputs.page_url }}
          DRIVE_FOLDER_NAME: ${{ inputs.drive_folder_name }}
          MAX_IDLE_SCROLLS: ${{ inputs.max_idle_scrolls }}
          MAX_IMAGES: ${{ inputs.max_images }}
          GDRIVE_PARENT_ID: ${{ inputs.parent_folder_id }}
          SPREADSHEET_ID: ${{ inputs.spreadsheet_id }}
          SHEET_TAB: ${{ inputs.sheet_tab }}
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          PYTHONUNBUFFERED: "1"
        run: python -u scrape_upload.py

      - name: Upload run log as artifact (optional debug aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-images
          path: downloaded_images/
          if-no-files-found: ignore
